# PushUS Supabase local config

project_id = "pushus"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = [
  "http://127.0.0.1:5173/auth/callback",
  "http://localhost:5173/auth/callback",
]
jwt_expiry = 3600
enable_signup = true

# Hosted PushUS project (ap-southeast-2). Used by `supabase config push`.
[remotes.production]
project_id = "zcwvvhuihqlldnbwhivl"

[remotes.production.auth]
site_url = "https://www.pushus.app"
additional_redirect_urls = [
  "https://www.pushus.app/auth/callback",
  "https://pushus.app/auth/callback",
  "https://pushus.pages.dev/auth/callback",
  "http://127.0.0.1:5173/auth/callback",
  "http://localhost:5173/auth/callback",
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
otp_length = 6
otp_expiry = 3600

[auth.email.template.magic_link]
subject = "Your PushUS sign-in code"
content_path = "./supabase/templates/magic_link.html"

# Per-function JWT verification. Without these, `functions deploy` defaults to
# verify_jwt = true, which 401s callers that don't send a Supabase JWT — the
# cron (Bearer CRON_SECRET) and the Stripe webhook (stripe-signature). Keep them
# here so a plain redeploy can't silently break those.
[functions.send-push-reminders]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.send-nudge]
verify_jwt = true

[functions.send-social]
verify_jwt = true
